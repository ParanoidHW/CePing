description: Wan2.1 DiT 14B
architecture: wan_dit
sparse_type: dense
attention_features:
  - standard

config:
  hidden_size: 5120
  num_layers: 40
  num_heads: 40
  dtype: bf16

param_schema:
  training:
    - name: batch_size
      label: Batch Size
      type: number
      default: 1
    - name: num_frames
      label: Num Frames
      type: number
      default: 81
    - name: height
      label: Height
      type: number
      default: 720
    - name: width
      label: Width
      type: number
      default: 1280
  inference:
    - name: batch_size
      label: Batch Size
      type: number
      default: 1
    - name: num_frames
      label: Num Frames
      type: number
      default: 81
    - name: height
      label: Height
      type: number
      default: 720
    - name: width
      label: Width
      type: number
      default: 1280
    - name: num_steps
      label: Inference Steps
      type: number
      default: 50
    - name: use_cfg
      label: Use CFG
      type: select
      default: "true"
      options:
        - "true"
        - "false"