description: HunyuanImage 3.0 (Text + Diffusion)
preset_type: model
architecture: hunyuan_image_3
sparse_type: hunyuan_moe
attention_features:
  - qk_norm
  - gqa
supported_workloads:
  - inference
  - diffusion

model_class_map:
  inference: hunyuan_image_3_text
  diffusion: hunyuan_image_3_diffusion

config:
  vocab_size: 133120
  hidden_size: 4096
  num_layers: 32
  num_heads: 32
  num_kv_heads: 8
  head_dim: 128
  moe_intermediate_size: 3072
  num_experts: 64
  num_experts_per_token: 8
  num_shared_experts: 1
  use_qk_norm: true
  max_seq_len: 4096
  image_height: 64
  image_width: 64
  latent_channels: 16
  dtype: fp16

param_schema:
  inference:
    - name: batch_size
      label: Batch Size
      type: number
      default: 8
    - name: prompt_len
      label: Prompt Length
      type: number
      default: 1024
    - name: generation_len
      label: Generation Length
      type: number
      default: 128
  diffusion:
    - name: batch_size
      label: Batch Size
      type: number
      default: 1
    - name: image_height
      label: Image Height (latent)
      type: number
      default: 64
    - name: image_width
      label: Image Width (latent)
      type: number
      default: 64
    - name: num_steps
      label: Diffusion Steps
      type: number
      default: 50