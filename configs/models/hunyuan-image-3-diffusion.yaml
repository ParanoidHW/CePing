description: HunyuanImage 3.0 Diffusion Model
preset_type: model
architecture: hunyuan_image_3_diffusion
sparse_type: hunyuan_moe
attention_features:
  - qk_norm
  - gqa

config:
  hidden_size: 4096
  num_layers: 32
  num_heads: 32
  num_kv_heads: 8
  head_dim: 128
  moe_intermediate_size: 3072
  num_experts: 64
  num_experts_per_token: 8
  num_shared_experts: 1
  use_qk_norm: true
  image_height: 64
  image_width: 64
  latent_channels: 16
  dtype: fp16

param_schema:
  training:
    - name: batch_size
      label: Batch Size
      type: number
      default: 1
    - name: image_height
      label: Image Height (latent)
      type: number
      default: 64
    - name: image_width
      label: Image Width (latent)
      type: number
      default: 64
  inference:
    - name: batch_size
      label: Batch Size
      type: number
      default: 1
    - name: image_height
      label: Image Height (latent)
      type: number
      default: 64
    - name: image_width
      label: Image Width (latent)
      type: number
      default: 64
    - name: num_steps
      label: Diffusion Steps
      type: number
      default: 50