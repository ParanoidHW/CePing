description: HunyuanImage 3.0 Diffusion Pipeline (T5 + Backbone + VAE)
preset_type: pipeline
architecture: hunyuan_diffusion_pipeline
sparse_type: hunyuan_moe
attention_features:
  - qk_norm
  - gqa
supported_workloads:
  - diffusion

config:
  text_encoder: hunyuan-t5-encoder
  backbone: hunyuan_image_3_diffusion
  vae_encoder: hunyuan-vae-encoder
  vae_decoder: hunyuan-vae-decoder

param_schema:
  diffusion:
    - name: batch_size
      label: Batch Size
      type: number
      default: 1
    - name: image_height
      label: Image Height
      type: number
      default: 1024
    - name: image_width
      label: Image Width
      type: number
      default: 1024
    - name: num_steps
      label: Diffusion Steps
      type: number
      default: 50
    - name: use_cfg
      label: Use CFG
      type: select
      default: "true"
      options:
        - "true"
        - "false"