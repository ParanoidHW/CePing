name: speculative-decoding
description: 投机解码（draft + target协作）
workload_type: inference

component_mapping:
  draft: draft
  target: target

phases:
  - name: draft_prefill
    compute_type: forward
    component: draft
    compute_pattern: transformer_block
    repeat: 1
    
  - name: draft_decode
    compute_type: forward
    component: draft
    compute_pattern: transformer_block
    repeat: draft_len
    
  - name: target_verify
    compute_type: forward
    component: target
    compute_pattern: transformer_block
    repeat: 1

default_params:
  batch_size: 1
  prompt_len: 512
  generation_len: 128
  draft_len: 5

throughput_metric: tokens_per_sec