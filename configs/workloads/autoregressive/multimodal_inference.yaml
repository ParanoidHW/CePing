name: multimodal-inference
description: 多模态推理（图像/视频 + 文本）
workload_type: autoregressive

phases:
  - name: encode_image
    compute_type: forward
    component: encoder
    compute_pattern: attention_only
    repeat: 1
    extra_params:
      seq_len: image_seq_len
      
  - name: prefill
    compute_type: forward
    component: main
    compute_pattern: transformer_block
    repeat: 1
    extra_params:
      seq_len: prompt_len + image_seq_len
      
  - name: decode
    compute_type: forward
    component: main
    compute_pattern: transformer_block
    repeat: generation_len
    extra_params:
      seq_len: 1

default_params:
  batch_size: 1
  prompt_len: 512
  image_seq_len: 256
  generation_len: 128

throughput_metric: tokens_per_sec