name: conv-encoder
description: 卷积编码（VAE Encoder等）
workload_type: inference

phases:
  - name: encode
    compute_type: forward
    component: main
    compute_pattern: conv_encoder
    repeat: 1

default_params:
  batch_size: 1
  num_frames: 81
  height: 720
  width: 1280

throughput_metric: pixels_per_sec