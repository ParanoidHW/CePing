<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Performance Evaluator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>LLM Performance Evaluator</h1>
            <p class="subtitle">大模型训推性能评估工具</p>
        </header>

        <main>
            <div class="grid">
                <section class="card workload-config">
                    <h2>Workload 配置</h2>
                    <div class="form-group">
                        <label>计算场景</label>
                        <select id="workload-scenario">
                            <option value="training">Training（训练）</option>
                            <option value="inference">Inference（推理）</option>
                            <option value="pd_disagg">PD-Disagg（推理 PD 分离）</option>
                            <option value="rl_training">RL-Training（RL 后训练）</option>
                            <option value="diffusion">Diffusion（多模态生成）</option>
                        </select>
                    </div>
                    
                    <div id="workload-params-training" class="workload-params">
                        <div class="section-hint">Training 参数</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Batch Size</label>
                                <input type="number" id="train-batch-size" value="32">
                            </div>
                            <div class="form-group">
                                <label>Micro Batch Size</label>
                                <input type="number" id="micro-batch-size" value="1">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>序列长度 (seq_len)</label>
                                <input type="number" id="train-seq-len" value="4096">
                            </div>
                            <div class="form-group">
                                <label>训练步数</label>
                                <input type="number" id="num-steps" value="1000">
                            </div>
                        </div>
                    </div>

                    <div id="workload-params-inference" class="workload-params" style="display: none;">
                        <div class="section-hint">Inference 参数</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Batch Size</label>
                                <input type="number" id="infer-batch-size" value="1">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>输入 Tokens (input_tokens)</label>
                                <input type="number" id="infer-input-tokens" value="1000">
                            </div>
                            <div class="form-group">
                                <label>输出 Tokens (output_tokens)</label>
                                <input type="number" id="infer-output-tokens" value="100">
                            </div>
                        </div>
                    </div>

                    <div id="workload-params-pd_disagg" class="workload-params" style="display: none;">
                        <div class="section-hint">PD-Disagg 参数</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Batch Size</label>
                                <input type="number" id="pd-batch-size" value="1">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>输入 Tokens (input_tokens)</label>
                                <input type="number" id="pd-input-tokens" value="1000">
                            </div>
                            <div class="form-group">
                                <label>输出 Tokens (output_tokens)</label>
                                <input type="number" id="pd-output-tokens" value="100">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Prefill 设备数</label>
                                <input type="number" id="prefill-devices" value="32" min="1">
                            </div>
                            <div class="form-group">
                                <label>Decode 设备数</label>
                                <input type="number" id="decode-devices" value="32" min="1">
                            </div>
                        </div>
                    </div>

                    <div id="workload-params-rl_training" class="workload-params" style="display: none;">
                        <div class="section-hint">RL-Training 参数</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Batch Size</label>
                                <input type="number" id="rl-batch-size" value="32">
                            </div>
                            <div class="form-group">
                                <label>序列长度 (seq_len)</label>
                                <input type="number" id="rl-seq-len" value="4096">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Rollout 次数</label>
                                <input type="number" id="num-rollouts" value="100">
                            </div>
                            <div class="form-group">
                                <label>PPO Epochs</label>
                                <input type="number" id="ppo-epochs" value="4">
                            </div>
                        </div>
                    </div>

                    <div id="workload-params-diffusion" class="workload-params" style="display: none;">
                        <div class="section-hint">Diffusion 参数</div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Batch Size</label>
                                <input type="number" id="diffusion-batch-size" value="1">
                            </div>
                            <div class="form-group">
                                <label>Diffusion 步数</label>
                                <input type="number" id="diffusion-steps" value="50">
                            </div>
                        </div>
                        
                        <div class="section-hint">生成模式</div>
                        <div class="mode-selector">
                            <div class="tabs" id="diffusion-mode-tabs">
                                <button type="button" class="tab active" data-mode="T2I">T2I</button>
                                <button type="button" class="tab" data-mode="T2V">T2V</button>
                                <button type="button" class="tab" data-mode="I2I">I2I</button>
                                <button type="button" class="tab" data-mode="I2V">I2V</button>
                                <button type="button" class="tab" data-mode="V2V">V2V</button>
                            </div>
                        </div>
                        
                        <div id="diffusion-input-config">
                            <div class="section-hint">输入配置</div>
                            <div class="form-row" id="diffusion-input-row">
                                <div class="form-group" id="diffusion-prompt-group">
                                    <label>Prompt Tokens</label>
                                    <input type="number" id="diffusion-prompt-tokens" value="512">
                                </div>
                                <div class="form-group" id="diffusion-input-image-group" style="display: none;">
                                    <label>输入图像</label>
                                    <div class="diffusion-resolution-input">
                                        <input type="number" id="diffusion-input-image-width" value="1024" placeholder="宽">
                                        <input type="number" id="diffusion-input-image-height" value="1024" placeholder="高">
                                    </div>
                                </div>
                                <div class="form-group" id="diffusion-input-video-group" style="display: none;">
                                    <label>输入视频</label>
                                    <div class="diffusion-resolution-input">
                                        <input type="number" id="diffusion-input-video-width" value="1920" placeholder="宽">
                                        <input type="number" id="diffusion-input-video-height" value="1080" placeholder="高">
                                    </div>
                                    <div class="form-group" style="margin-top: 0.5rem;">
                                        <label>输入帧数</label>
                                        <input type="number" id="diffusion-input-video-frames" value="16">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div id="diffusion-output-config">
                            <div class="section-hint">输出配置</div>
                            <div class="form-row" id="diffusion-output-row">
                                <div class="form-group" id="diffusion-output-image-group">
                                    <label>输出图像</label>
                                    <div class="diffusion-resolution-input">
                                        <input type="number" id="diffusion-output-image-width" value="1024" placeholder="宽">
                                        <input type="number" id="diffusion-output-image-height" value="1024" placeholder="高">
                                    </div>
                                </div>
                                <div class="form-group" id="diffusion-output-video-group" style="display: none;">
                                    <label>输出视频</label>
                                    <div class="diffusion-resolution-input">
                                        <input type="number" id="diffusion-output-video-width" value="1920" placeholder="宽">
                                        <input type="number" id="diffusion-output-video-height" value="1080" placeholder="高">
                                    </div>
                                    <div class="form-group" style="margin-top: 0.5rem;">
                                        <label>输出帧数</label>
                                        <input type="number" id="diffusion-output-video-frames" value="24">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card cluster-config">
                    <h2>集群拓扑</h2>
                    
                    <div class="form-group">
                        <label>设备厂商</label>
                        <select id="device-vendor">
                            <option value="NVIDIA">NVIDIA</option>
                            <option value="AMD">AMD</option>
                            <option value="Huawei">Huawei Ascend</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>设备型号</label>
                        <select id="device-model"></select>
                    </div>

                    <div class="form-group">
                        <label>总设备数</label>
                        <input type="number" id="total-devices" value="64" min="1">
                    </div>

                    <div class="form-group">
                        <label>拓扑类型</label>
                        <select id="topology-type">
                            <option value="2-Tier Simple">2层简单 (2-Tier)</option>
                            <option value="3-Tier Clos">3层Clos</option>
                            <option value="Fat-Tree">胖树 (Fat-Tree)</option>
                            <option value="CloudMatrix Supernode">CloudMatrix超节点</option>
                        </select>
                    </div>

                    <div id="topology-params"></div>
                </section>

                <section class="card model-config">
                    <h2>模型配置</h2>
                    
                    <div class="model-config-container">
                        <div class="model-select-col">
                            <div class="form-group">
                                <label>模型预设</label>
                                <select id="model-preset">
                                    <option value="">自定义 (Custom)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>模型类型</label>
                                <select id="model-type">
                                    <option value="dense">Dense</option>
                                    <option value="standard_moe">MoE</option>
                                    <option value="deepseek_moe">DeepSeek MoE</option>
                                    <option value="qwen3_5_moe">Qwen3.5 MoE</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="model-detail-col">
                            <div class="detail-grid">
                                <div class="spec-panel">
                                    <div id="model-spec-display" class="model-spec-compact">
                                        <p class="hint-text">选择预设后显示规格</p>
                                    </div>
                                </div>
                                
                                <div class="input-panel">
                                    <div class="compact-form">
                                        <div class="form-row-compact">
                                            <label>Hidden</label>
                                            <input type="number" id="hidden-size" value="4096" class="compact-input">
                                        </div>
                                        <div class="form-row-compact">
                                            <label>Layers</label>
                                            <input type="number" id="num-layers" value="32" class="compact-input">
                                        </div>
                                        <div class="form-row-compact">
                                            <label>Heads</label>
                                            <input type="number" id="num-heads" value="32" class="compact-input">
                                        </div>
                                        <div class="form-row-compact">
                                            <label>Seq Len</label>
                                            <input type="number" id="max-seq-len" value="4096" class="compact-input">
                                        </div>
                                        <div class="form-row-compact moe-only" style="display: none;">
                                            <label>Experts</label>
                                            <input type="number" id="num-experts" value="8" class="compact-input">
                                        </div>
                                        <div class="form-row-compact moe-only" style="display: none;">
                                            <label>Top-K</label>
                                            <input type="number" id="experts-per-token" value="2" class="compact-input">
                                        </div>
                                        <div class="form-row-compact">
                                            <label>Dtype</label>
                                            <select id="dtype" class="compact-input">
                                                <option value="fp16">FP16</option>
                                                <option value="bf16">BF16</option>
                                                <option value="fp8">FP8</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card parallelism-config">
                    <h2>并行切分配置</h2>
                    
                    <div id="parallel-single" class="parallel-mode">
                        <div class="parallel-grid-wide">
                            <div class="form-group">
                                <label>TP (Tensor)</label>
                                <input type="number" id="tp-degree" value="8" min="1">
                            </div>
                            <div class="form-group">
                                <label>PP (Pipeline)</label>
                                <input type="number" id="pp-degree" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>VPP (Virtual PP)</label>
                                <input type="number" id="vpp-degree" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>EP (Expert)</label>
                                <input type="number" id="ep-degree" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>Ulysses-SP</label>
                                <input type="number" id="ulysses-degree" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>Ring-SP（含CP）</label>
                                <input type="number" id="ring-degree" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>Pipeline Schedule</label>
                                <select id="pipeline-schedule">
                                    <option value="1f1b">1F1B</option>
                                    <option value="gpipe">GPipe</option>
                                    <option value="interleaved">Interleaved</option>
                                </select>
                            </div>
                            <div class="form-group checkbox-group">
                                <label>Megatron-SP</label>
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="megatron-sp-enabled">
                                    <span class="checkbox-label">启用</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>DP (Data) <span class="auto-calc-hint">自动计算</span></label>
                                <div class="readonly-display" id="dp-degree-display">1</div>
                                <input type="hidden" id="dp-degree" value="1">
                            </div>
                        </div>
                    </div>
                    
                    <div id="parallel-pd-disagg" class="parallel-mode" style="display: none;">
                        <div class="dual-strategy-container">
                            <div class="strategy-panel">
                                <div class="section-hint">Prefill 实例策略</div>
                                <div class="parallel-grid-wide">
                                    <div class="form-group">
                                        <label>TP_p</label>
                                        <input type="number" id="pd-tp-prefill" value="8" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>PP_p</label>
                                        <input type="number" id="pd-pp-prefill" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>EP_p</label>
                                        <input type="number" id="pd-ep-prefill" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>Ulysses_p</label>
                                        <input type="number" id="pd-ulysses-prefill" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>Ring_p</label>
                                        <input type="number" id="pd-ring-prefill" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>DP_p <span class="auto-calc-hint">自动</span></label>
                                        <div class="readonly-display" id="pd-dp-prefill-display">4</div>
                                    </div>
                                </div>
                            </div>
                            <div class="strategy-panel">
                                <div class="section-hint">Decode 实例策略</div>
                                <div class="parallel-grid-wide">
                                    <div class="form-group">
                                        <label>TP_d</label>
                                        <input type="number" id="pd-tp-decode" value="4" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>PP_d</label>
                                        <input type="number" id="pd-pp-decode" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>EP_d</label>
                                        <input type="number" id="pd-ep-decode" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>Ulysses_d</label>
                                        <input type="number" id="pd-ulysses-decode" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>Ring_d</label>
                                        <input type="number" id="pd-ring-decode" value="1" min="1">
                                    </div>
                                    <div class="form-group">
                                        <label>DP_d <span class="auto-calc-hint">自动</span></label>
                                        <div class="readonly-display" id="pd-dp-decode-display">8</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="parallel-rl-training" class="parallel-mode" style="display: none;">
                        <div class="mode-selector">
                            <div class="tabs" id="rl-phase-tabs">
                                <button type="button" class="tab active" data-phase="train">训练阶段</button>
                                <button type="button" class="tab" data-phase="infer">推理阶段 (Rollout)</button>
                            </div>
                        </div>
                        
                        <div id="rl-strategy-train" class="rl-strategy-panel">
                            <div class="section-hint">训练阶段并行策略</div>
                            <div class="parallel-grid-wide">
                                <div class="form-group">
                                    <label>TP_train</label>
                                    <input type="number" id="rl-tp-train" value="8" min="1">
                                </div>
                                <div class="form-group">
                                    <label>PP_train</label>
                                    <input type="number" id="rl-pp-train" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>VPP_train</label>
                                    <input type="number" id="rl-vpp-train" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>EP_train</label>
                                    <input type="number" id="rl-ep-train" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>Ulysses_train</label>
                                    <input type="number" id="rl-ulysses-train" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>Ring_train</label>
                                    <input type="number" id="rl-ring-train" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>DP_train <span class="auto-calc-hint">自动</span></label>
                                    <div class="readonly-display" id="rl-dp-train-display">-</div>
                                </div>
                            </div>
                        </div>
                        
                        <div id="rl-strategy-infer" class="rl-strategy-panel" style="display: none;">
                            <div class="section-hint">推理阶段并行策略</div>
                            <div class="parallel-grid-wide">
                                <div class="form-group">
                                    <label>TP_infer</label>
                                    <input type="number" id="rl-tp-infer" value="4" min="1">
                                </div>
                                <div class="form-group">
                                    <label>PP_infer</label>
                                    <input type="number" id="rl-pp-infer" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>VPP_infer</label>
                                    <input type="number" id="rl-vpp-infer" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>EP_infer</label>
                                    <input type="number" id="rl-ep-infer" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>Ulysses_infer</label>
                                    <input type="number" id="rl-ulysses-infer" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>Ring_infer</label>
                                    <input type="number" id="rl-ring-infer" value="1" min="1">
                                </div>
                                <div class="form-group">
                                    <label>DP_infer <span class="auto-calc-hint">自动</span></label>
                                    <div class="readonly-display" id="rl-dp-infer-display">-</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="dp-validation-error" class="validation-error" style="display: none;"></div>

                    <div class="section-hint memory-opt-section">内存优化</div>
                    <div class="memory-opts">
                        <div class="form-check memory-opt-recompute">
                            <input type="checkbox" id="activation-checkpointing">
                            <label for="activation-checkpointing">Activation Checkpointing</label>
                        </div>
                        <div class="form-group inline-group memory-opt-zero">
                            <label>ZeRO Stage</label>
                            <select id="zero-stage">
                                <option value="0">Disabled</option>
                                <option value="1">Stage 1</option>
                                <option value="2">Stage 2</option>
                                <option value="3">Stage 3</option>
                            </select>
                        </div>
                    </div>
                </section>
            </div>

            <div class="action-bar">
                <button id="evaluate-btn" class="btn-primary">
                    <span class="btn-text">开始评估</span>
                    <span class="spinner" style="display: none;"></span>
                </button>
            </div>

            <section id="results" class="card results" style="display: none;">
                <h2>评估结果</h2>
                <div id="results-content"></div>
            </section>
        </main>

        <footer>
            <p>LLM Performance Evaluator &copy; 2025</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
